name: Mango detection tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lightweight dependencies
        run: pip install -r requirements-lite.txt

      - name: Create synthetic demonstration dataset
        run: python src/create_demo_dataset.py

      - name: Validate dataset structure
        run: python src/validate_dataset.py --config configs/demo_dataset.yaml

      - name: Run demonstration evaluation
        run: python src/demo_evaluation.py

      - name: Run automated tests
        run: python -m unittest discover -s tests
